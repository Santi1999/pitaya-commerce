services:
  postgres:
    image: postgres:16-alpine
    container_name: pitaya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa-store"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pitaya_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment}
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitaya_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/medusa-store
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - STORE_CORS=${STORE_CORS:?Set STORE_CORS to your storefront URL}
      - ADMIN_CORS=${ADMIN_CORS:?Set ADMIN_CORS to your admin URL}
      - AUTH_CORS=${AUTH_CORS:?Set AUTH_CORS to your auth URL}
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  storefront:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pitaya_frontend
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=http://medusa:9000,
      - MEDUSA_BACKEND_URL=http://medusa:9000
      - NODE_ENV=production
    networks:
      - medusa_network
    command: npm run build
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge
