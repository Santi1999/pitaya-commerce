services:
  postgres:
    image: postgres:16-alpine
    container_name: pitaya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.30"
    shm_size: 128m
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=256MB
        -c max_connections=30

  redis:
    image: redis:7-alpine
    container_name: pitaya_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment} --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - medusa_network
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.10"

  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pitaya_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/medusa-store
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - STORE_CORS=${STORE_CORS:?Set STORE_CORS to your storefront URL}
      - ADMIN_CORS=${ADMIN_CORS:?Set ADMIN_CORS to your admin URL}
      - AUTH_CORS=${AUTH_CORS:?Set AUTH_CORS to your auth URL}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - medusa_network
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.00"

  storefront:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://medusa:9000}
        - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?Set NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL:-http://medusa:9000}
    container_name: pitaya_frontend
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://medusa:9000}
      - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL:-http://medusa:9000}
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - medusa_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge
