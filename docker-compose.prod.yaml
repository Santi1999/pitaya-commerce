services:
  postgres:
    ports: !override
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}

  redis:
    ports: !override
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment}

  medusa:
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/medusa-store
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - STORE_CORS=${STORE_CORS:?Set STORE_CORS to your storefront URL}
      - ADMIN_CORS=${ADMIN_CORS:?Set ADMIN_CORS to your admin URL}
      - AUTH_CORS=${AUTH_CORS:?Set AUTH_CORS to your auth URL}
    volumes: !override
      []

  storefront:
    environment:
      - NODE_ENV=production
    develop: !override
      {}
    command: npm run start
