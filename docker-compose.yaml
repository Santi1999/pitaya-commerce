services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pitaya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pitaya_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pitaya_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./backend:/server
      - /server/node_modules
    networks:
      - medusa_network

  # Frontend Store
  # This service runs the storefront application.
  storefront:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pitaya_frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=http://medusa:9000
      - MEDUSA_BACKEND_URL=http://medusa:9000
      - NODE_ENV=development
    env_file:
      - .env
    networks:
      - medusa_network
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /storefront
        - action: rebuild
          path: frontend/package.json
    command: npm run dev

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge
